# Battery level reporting interval (units: seconds)
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60
# Increase keyboard debouncing duration
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
# Increase the keyboard's BLE radio transmit power to resolve issues with latency and poor communication between the left and right halves
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Enable the soft-off feature via the keymap or dedicated hardware
CONFIG_ZMK_PM_SOFT_OFF=y
